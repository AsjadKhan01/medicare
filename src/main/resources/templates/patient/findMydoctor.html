<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="patient/base::layout(~{::section})">
<head>
<meta charset="ISO-8859-1">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insert title here</title>

</head>
<body>

	<section class="hero-section">
		<main class="container-fluid main-wrap">

			<!-- ===== PAGE HEADING ===== -->
			<div class="page-heading-row">
				<h1 class="page-heading">Find a Doctor</h1>
				<p class="page-sub">Search, compare, and book an appointment in
					a few taps</p>
			</div>

			<!-- ===== SEARCH / FILTER BAR ===== -->
			<section class="search-bar">
				<div class="search-input-wrap">
					<i class="bi bi-search"></i> <input type="text"
						class="search-input" id="searchInput"
						placeholder="Search by name...">
				</div>

				<div class="filter-group">
					<select class="form-select filter-select" id="specializationFilter">
						<option value="">Specialization</option>
						<option value="Cardiologist">Cardiologist</option>
						<option value="Orthopedic">Orthopedic</option>
						<option value="Dermatologist">Dermatologist</option>
						<option value="Pediatrician">Pediatrician</option>
					</select> <select class="form-select filter-select" id="availabilityFilter">
						<option value="">Available today</option>
						<option value="today">Available today</option>
						<option value="week">This week</option>
					</select>
				</div>
			</section>

			<!-- ===== DOCTOR LIST ===== -->
			<section class="doctor-list" id="doctorList">

				<!-- Doctor card 1 -->
				<section class="doctor-list" id="doctorList">

					<article class="doctor-card" th:each="doctor: ${doctors}"
						th:attr="data-doctor-id=${doctor.id}, data-name=${doctor.name}, data-spec=${doctor.department}">

						<div class="doctor-card-row" data-toggle="expand">
							<div class="doctor-identity">
								<span class="avatar-md"
									th:text="${#strings.substring(doctor.name,4,6)}">NS</span>
								<div class="doctor-info">
									<h2 class="doctor-name" th:text="${doctor.name}">Dr. Neha
										Sharma</h2>
									<p class="doctor-meta">
										<span th:text="${doctor.department}">Cardiologist</span>
										&middot; <span th:text="${doctor.experience} + ' yrs exp'">8
											yrs exp</span> &middot; <span th:text="${doctor.hospital}">AIIMS
											Delhi</span>
									</p>
									<span class="availability-pill availability-pill--today">
										<span class="dot dot--live"></span> Available today
									</span>
								</div>
							</div>
							<button class="btn btn-view-book" type="button">
								View &amp; Book <i class="bi bi-chevron-down"></i>
							</button>
						</div>

						<!-- Slot picker abhi static rakh rahe â baad mein dynamic karenge -->

						<div class="slot-picker" th:id="'picker-' + ${doctor.id}">
							<div class="slot-picker-inner">

								<div th:if="${doctor.slots == null or doctor.slots.isEmpty()}">
									<p class="pending-note">
										<i class="bi bi-info-circle"></i> No available slots right
										now.
									</p>
								</div>

								<div
									th:unless="${doctor.slots == null or doctor.slots.isEmpty()}">

									<p class="slot-row-label">Available slots</p>

									<form th:action="@{/patient/bookSlot}" method="post"
										class="slot-booking-form">

										<input type="hidden" name="doctorId" th:value="${doctor.id}">

										<div class="slot-chip-row" th:attr="data-doctor=${doctor.id}">
											<label class="slot-chip" th:each="slot : ${doctor.slots}">
												<input type="radio" name="slotId" th:value="${slot.id}"
												class="slot-chip-input" required> 
												<span
												th:text="${#temporals.format(slot.date, 'EEE dd')} + ' Â· ' + ${slot.time}">Mon 29 Â· 10:00</span>
											</label>
										</div>

										<div class="slot-booking-footer">
											<input type="text" name="reason"
												class="form-control reason-input"
												placeholder="Reason for visit (optional)">
											<button type="submit" class="btn btn-confirm-booking">
												<i class="bi bi-calendar2-check"></i> Confirm Booking
											</button>
										</div>
									</form>

									<p class="pending-note">
										<i class="bi bi-info-circle"></i> Booking creates a <strong>pending
											request</strong> &mdash; the doctor must accept to confirm.
									</p>
								</div>

							</div>
						</div>
					</article>

				</section>

			</section>

			<div class="empty-state d-none" id="noResultsState">
				<i class="bi bi-search"></i>
				<p>No doctors match your search.</p>
				<button class="btn btn-clear-filters" id="clearFiltersBtn"
					type="button">Clear filters</button>
			</div>

		</main>

		<!-- Toast container -->
		<div class="toast-stack" id="toastStack"></div>

	</section>
</body>
</html>
