<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="base::layout(~{::section})">
<head>
<meta charset="ISO-8859-1">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insert title here</title>

<!-- Bootstrap 5.3.3 -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<!-- Bootstrap Icons -->
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
	href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap"
	rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/patient_panel.css}" />

</head>
<body>

	<section class="hero-section">
		<link rel="stylesheet" th:href="@{/css/patient_panel.css}" />

		<!-- ===== TOP NAV ===== -->
		<header class="topbar">
			<div
				class="container-fluid d-flex align-items-center justify-content-between">
				<a href="doctor" class="brand"> <span class="brand-mark"><i
						class="bi bi-heart-pulse-fill"></i></span> <span class="brand-name">MediCare</span>
				</a>

				<nav class="top-nav d-none d-md-flex">
					<a href="#" class="top-nav-link is-active">Find a Doctor</a> <a
						href="#" class="top-nav-link">My Appointments</a>
				</nav>

				<div class="dropdown patient-switch">
					<button class="btn dropdown-toggle d-flex align-items-center gap-2"
						type="button" data-bs-toggle="dropdown" aria-expanded="false">
						<span class="avatar-sm">AK</span> <span class="patient-label">Hi,
							Asjad</span>
					</button>
					<ul class="dropdown-menu dropdown-menu-end">
						<li><a class="dropdown-item" href="#"><i
								class="bi bi-calendar2-check me-2"></i>My Appointments</a></li>
						<li><a class="dropdown-item" href="#"><i
								class="bi bi-person me-2"></i>Profile</a></li>
						<li><hr class="dropdown-divider"></li>
						<li><a class="dropdown-item" href="#"><i
								class="bi bi-box-arrow-right me-2"></i>Sign out</a></li>
					</ul>
				</div>
			</div>
		</header>

		<main class="container-fluid main-wrap">

			<!-- ===== PAGE HEADING ===== -->
			<div class="page-heading-row">
				<h1 class="page-heading">Find a Doctor</h1>
				<p class="page-sub">Search, compare, and book an appointment in
					a few taps</p>
			</div>

			<!-- ===== SEARCH / FILTER BAR ===== -->
			<section class="search-bar">
				<div class="search-input-wrap">
					<i class="bi bi-search"></i> <input type="text"
						class="search-input" id="searchInput"
						placeholder="Search by name...">
				</div>

				<div class="filter-group">
					<select class="form-select filter-select" id="specializationFilter">
						<option value="">Specialization</option>
						<option value="Cardiologist">Cardiologist</option>
						<option value="Orthopedic">Orthopedic</option>
						<option value="Dermatologist">Dermatologist</option>
						<option value="Pediatrician">Pediatrician</option>
					</select> <select class="form-select filter-select" id="availabilityFilter">
						<option value="">Available today</option>
						<option value="today">Available today</option>
						<option value="week">This week</option>
					</select>
				</div>
			</section>

			<!-- ===== DOCTOR LIST ===== -->
			<section class="doctor-list" id="doctorList">

				<!-- Doctor card 1 -->
				<section class="doctor-list" id="doctorList">

					<article class="doctor-card" th:each="doctor : ${doctors}"
						th:attr="data-doctor-id=${doctor.id}, data-name=${doctor.name}, data-spec=${doctor.department}">

						<div class="doctor-card-row" data-toggle="expand">
							<div class="doctor-identity">
								<span class="avatar-md"
									th:text="${#strings.substring(doctor.name,0,2)}">NS</span>
								<div class="doctor-info">
									<h2 class="doctor-name" th:text="${doctor.name}">Dr. Neha
										Sharma</h2>
									<p class="doctor-meta">
										<span th:text="${doctor.department}">Cardiologist</span>
										&middot; <span th:text="${doctor.experience} + ' yrs exp'">8
											yrs exp</span> &middot; <span th:text="${doctor.hospital}">AIIMS
											Delhi</span>
									</p>
									<span class="availability-pill availability-pill--today">
										<span class="dot dot--live"></span> Available today
									</span>
								</div>
							</div>
							<button class="btn btn-view-book" type="button">
								View &amp; Book <i class="bi bi-chevron-down"></i>
							</button>
						</div>

						<!-- Slot picker abhi static rakh rahe â baad mein dynamic karenge -->
						<div class="slot-picker">
							<div class="slot-picker-inner">
								<p class="pending-note">
									<i class="bi bi-info-circle"></i> Slot booking coming soon.
								</p>
							</div>
						</div>
					</article>

				</section>

			</section>

			<div class="empty-state d-none" id="noResultsState">
				<i class="bi bi-search"></i>
				<p>No doctors match your search.</p>
				<button class="btn btn-clear-filters" id="clearFiltersBtn"
					type="button">Clear filters</button>
			</div>

		</main>

		<!-- Toast container -->
		<div class="toast-stack" id="toastStack"></div>

		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
		<script src="script.js"></script>

	</section>
</body>
</html>
