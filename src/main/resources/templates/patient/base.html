<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:fragment="layout(content)">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title th:text="${title}">patient Base page</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<!-- Bootstrap Icons -->
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
	href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap"
	rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/patient_panel.css}" />
</head>
<body>
	<!-- ===== TOP NAV ===== -->
	<header class="topbar">
		<div
			class="container-fluid d-flex align-items-center justify-content-between">
			<a href="doctor" class="brand"> <span class="brand-mark"><i
					class="bi bi-heart-pulse-fill"></i></span> <span class="brand-name">MediCare</span>
			</a>

			<nav class="top-nav d-none d-md-flex">
				<a
					th:class="${activePage == 'findMyDoctor'} ? 'top-nav-link is-active' : 'top-nav-link'"
					href="/patient/findMyDoctor">Find a Doctor</a> <a
					th:class="${activePage == 'appointment'} ? 'top-nav-link is-active' : 'top-nav-link'"
					href="/patient/appointment">My Appointments</a> <a
					th:class="${activePage == 'signUp'} ? 'top-nav-link is-active' : 'top-nav-link'"
					href="/patient/signUp">Sign Up</a> <a
					th:class="${activePage == 'login'} ? 'top-nav-link is-active' : 'top-nav-link'"
					href="/login">Log in</a>
			</nav>

			<div class="dropdown patient-switch">
				<button class="btn dropdown-toggle d-flex align-items-center gap-2"
					type="button" data-bs-toggle="dropdown" aria-expanded="false">
					<span class="avatar-sm">AK</span>Hi,<span class="patient-label"
						th:text="${loginUsername}"> Asjad</span>
				</button>
				<ul class="dropdown-menu dropdown-menu-end">

					<li><a class="dropdown-item" href="/patient/appointment"><i
							class="bi bi-calendar2-check me-2"></i>My Appointments</a></li>

					<li><a class="dropdown-item" href="#"><i
							class="bi bi-person me-2"></i>Profile</a></li>

					<li><hr class="dropdown-divider"></li>
					<li>
						<form th:action="@{/logout}" method="post">
							<a class="dropdown-item"><i
								class="bi bi-box-arrow-right me-2"></i><button type="submit" style="border:none; background-color: white"> Sign out</button></a>
						</form>
					</li>
				</ul>
			</div>
		</div>
	</header>


	<div th:replace="${content}"></div>
	<script th:src="@{/js/patient_panel.js}"></script>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
		crossorigin="anonymous"></script>

</body>
</html>
