<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="base::layout(~{::section})">
<head>
<meta charset="ISO-8859-1">
<title>Insert title here</title>
</head>
<body>

	<section class="signup-section">

		<div class="signup-card">

			<div class="signup-header">
				<span class="brand-mark"><i class="bi bi-heart-pulse-fill"></i></span>
				<h1 class="signup-title">MediCare Login</h1>
				<p class="signup-sub">Welcome back, sign in to continue</p>
			</div>

			<!-- Agar login fail hua tha, error dikhana -->
			<div th:if="${param.error}" class="alert alert-danger">Invalid
				email or password</div>

			<!-- Agar logout successful hua tha -->
			<div th:if="${param.logout}" class="alert alert-success">You
				have been logged out</div>

			<form th:action="@{/login}" method="post">

				<div class="form-row">
					<label class="form-label">Email</label> <input type="text"
						name="username" class="form-control" required>
				</div>

				<div class="form-row">
					<label class="form-label">Password</label> <input type="password"
						name="password" class="form-control" required>
				</div>

				<button type="submit" class="btn btn-signup w-100 mt-2">Login</button>

			</form>

			<p class="signup-footer">
				Don't have an account? <a th:href="@{/signUp}">Sign up</a>
			</p>

		</div>

	</section>


</body>
</html>
